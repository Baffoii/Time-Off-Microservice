name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# ── Shared setup ──────────────────────────────────────────────────────────────
# All jobs install deps the same way; Node + npm cache keeps it fast.

jobs:

  # ── 1. Unit Tests ────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run unit tests
        run: npm run test:unit -- --verbose

  # ── 2. Integration Tests ─────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run integration tests
        run: npm run test:integration -- --verbose

  # ── 3. E2E — Validation & Happy Path (Tests 1, 2, 5–12) ─────────────────────
  e2e-validation:
    name: "E2E: Validation & Happy Path"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run validation & happy path scenarios
        run: |
          npm run test:e2e -- --verbose \
            --testNamePattern="Test (1|2|5|6|7|8|9|10|11|12):"

  # ── 4. E2E — HCM Sync & Reconciliation (Tests 3, 4, 13–16, 25, 26, 31–33) ────
  e2e-sync:
    name: "E2E: HCM Sync & Reconciliation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run sync & reconciliation scenarios
        run: |
          npm run test:e2e -- --verbose \
            --testNamePattern="Test (3|4|13|14|15|16|25|26|31|32|33):"

  # ── 5. E2E — HCM Failure Modes (Tests 17–21, 24) ────────────────────────────
  e2e-failures:
    name: "E2E: HCM Failure Modes"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run HCM failure mode scenarios
        run: |
          npm run test:e2e -- --verbose \
            --testNamePattern="Test (17|18|19|20|21|24):"

  # ── 6. E2E — Concurrency & Idempotency (Tests 22, 23, 27–30) ────────────────
  e2e-concurrency:
    name: "E2E: Concurrency & Idempotency"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run concurrency & idempotency scenarios
        run: |
          npm run test:e2e -- --verbose \
            --testNamePattern="Test (22|23|27|28|29|30):"

  # ── 7. Coverage — all tests → publish to GitHub Pages ────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit, integration, e2e-validation, e2e-sync, e2e-failures, e2e-concurrency]
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run all tests with coverage
        run: npm run test:cov
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
